<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password | COPD System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-6">

    <div id="reset-box" class="glass-effect p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-200">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Create New Password</h2>
            <p class="text-slate-500 text-sm mt-2">Please enter your new secure password below.</p>
        </div>

        <form action="api/update_password.php" method="POST" class="space-y-5">
            
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider">New Password</label>
                <input type="password" name="new_password" placeholder="••••••••" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider">Confirm New Password</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-[0.98] uppercase tracking-wide text-sm mt-2">
                Update Password & Login
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="home_page.html" class="text-sm text-slate-400 hover:text-blue-600 transition-colors">
                Cancel and return to home
            </a>
        </div>
    </div>

</body>
</html>
