<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assistant Login | COPD Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f1f5f9;
            margin: 0;
            padding: 0;
        }

        /* HEADER */
        header {
            background: #ffffff;
            padding: 18px 35px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 26px;
            color: #0f172a;
            font-weight: 700;
        }

        header h1 span {
            font-weight: 300;
        }

        header a {
            color: #2563eb;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
        }

        header a:hover {
            text-decoration: underline;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* WRAPPER */
        .wrapper {
            max-width: 1000px;
            margin: 40px auto;
            display: flex;
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            height: 620px;
        }

        /* IMAGE SECTION */
        .image-section {
            width: 55%;
            position: relative;
        }

        .image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-overlay {
            position: absolute;
            bottom: 25px;
            left: 25px;
            right: 25px;
            background: linear-gradient(to top, rgba(15,23,42,0.9), rgba(15,23,42,0.3));
            padding: 30px;
            border-radius: 12px;
            color: white;
        }

        .image-overlay h3 {
            margin: 0;
            font-size: 30px;
            font-weight: 700;
        }

        .image-overlay p {
            margin-top: 10px;
            font-size: 16px;
            line-height: 1.6;
            color: #e0e7ff;
        }

        /* FORM SECTION */
        .form-section {
            width: 45%;
            padding: 45px 40px;
        }

        .form-section h2 {
            font-size: 32px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 10px;
        }

        .form-section p {
            color: #64748b;
            font-size: 18px;
            margin-bottom: 35px;
        }

        .row {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 18px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .forgot {
            text-align: right;
            margin-top: -10px;
        }

        .forgot a {
            color: #2563eb;
            font-size: 14px;
            text-decoration: underline;
        }

        button {
            width: 100%;
            margin-top: 100px;
            padding: 16px;
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        footer {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            margin-top: 30px;
            padding-bottom: 20px;
        }

        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
                height: auto;
            }
            .image-section {
                width: 100%;
                height: 240px;
            }
            .form-section {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-blue-600 text-3xl">pulmonology</span>
        <h1 class="text-xl font-bold text-gray-900">COPD <span class="text-xl font-normal text-gray-900">Detection</span></h1>
    </div>
   <div class="nav-links" style="display: flex; gap: 18px;">
    <a href="assistant_registration.html">Register</a>
    <a href="home_page.html">Home</a>
</div>


</header>

<!-- WRAPPER -->
<div class="wrapper">

    <!-- IMAGE SECTION -->
    <div class="image-section">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDXfFr1jN3VdNdXHzIm0BDORlL7VKvn3FAbY8M_bozo5xya-Gztr_5AInJpODnjQqYmTbxX-qFybGSg9liyau2ak_6WkuaEhoxLdLciJ1XDf1cEKGxVChAOGyaErL52prxQhQ9fxAD_PrNJZo8rV4N8M41f0rM_WAXsb3K-M-ioXboRnq6c915lr1xOg4uVccb-ecmQFGdOF_RDsurAtl8tAkX1LWyynRYUneZczA7gntdVGQGEB-CD29FyDaP_agB4DppVMs_Re-I" alt="COPD Image">

        <div class="image-overlay">
            <h3>Clinical Support </h3>
            <p>Access the COPD early detection dashboard through <strong>advanced deep learning technology</strong>.</p>
        </div>
    </div>

    <!-- FORM SECTION -->
    <div class="form-section">
        <h2>Assistant Login</h2>
        <p>Please enter your credentials to continue.</p>

        <form action="check_login.php" method="POST">
            <div class="row">
                <label for="staffid">Staff ID</label>
                <input type="text" id="staffid" name="staffid" placeholder="Enter Staff ID" required>
            </div>

           <div class="row" style="position: relative;">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter Password" required style="width: 100%; padding-right: 35px;">

            <!-- Eye icon SVG -->
            <span id="togglePassword" style="
                position: absolute;
                top: 67%;
                right: 10px;
                transform: translateY(-50%);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                user-select: none;
                width: 20px;
                height: 20px;
            ">
                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="black" width="20" height="20">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            </span>
        </div>

            <div class="forgot">
                <a href="forgot_password.html">Forgot password?</a>
            </div>

            <button type="submit">LOGIN</button>
        </form>
        <script>
document.querySelector('form').addEventListener('submit', async (e) => {
    e.preventDefault(); // පේජ් එක රිෆ්‍රෙෂ් වෙන එක නවත්තනවා

    const staff_id = document.querySelector('input[type="text"]').value;
    const password = document.querySelector('input[type="password"]').value;

    const payload = { staff_id, password };

    try {
        const res = await fetch('api/assistant_login.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.status === 'success') {
        // 1. ලැබුණු Assistant ගේ දත්ත (Name, Email, etc.) බ්‍රවුසරයේ තාවකාලිකව සේව් කරනවා
        localStorage.setItem('user_data', JSON.stringify(data.user));

        // 2. සාර්ථක පණිවිඩයක් පෙන්වනවා
        alert('Login Successful!');

        // 3. Dashboard එකට යොමු කරනවා
        window.location.href = 'assistant_dashboard.html'; 
    } else {
        alert('Error: ' + data.message);
    }
} catch (err) {
    console.error('Login error:', err);
    alert('Something went wrong. Please try again.');
}
});
</script>

    </div>
</div>

<footer>
    © 2026 COPD Detection System – Authorized clinical personnel access only
</footer>

<script>
const password = document.getElementById('password');
const togglePassword = document.getElementById('togglePassword');
const eyeIcon = document.getElementById('eyeIcon');

togglePassword.addEventListener('click', () => {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    // Toggle icon color for feedback
    eyeIcon.setAttribute('stroke', type === 'password' ? 'black' : 'gray');
});
</script>

</body>
</html>
