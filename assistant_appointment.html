        <main class="flex-1 overflow-y-auto">
           
            <section class="px-8 pt-8 pb-4"><h1 class="text-3xl font-black">Appointments List</h1></section>
            
            <section class="px-8 py-4">
                <div class="bg-white p-4 rounded-xl border border-[#dbe3f0] shadow-sm">
                    <input id="searchInput" type="text" placeholder="Search by Patient ID, MC Number or Staff ID..." class="w-full bg-[#f1f5fb] border border-[#dbe3f0] rounded-lg py-3 px-4 text-sm focus:ring-2 focus:ring-primary/40" />
                </div>
            </section>

            <section class="px-8 pb-8">
                <div class="bg-white rounded-xl border border-[#dbe3f0] shadow-sm overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="bg-[var(--table-header)]">
                            <tr class="border-b border-[#dbe3f0]">
                                <th class="px-6 py-4 text-left font-bold uppercase text-slate-500">Patient ID</th>
                                <th class="px-6 py-4 text-center font-bold uppercase text-slate-500">Appointment No</th>
                                <th class="px-6 py-4 text-center font-bold uppercase text-slate-500">Date</th>
                                <th class="px-6 py-4 text-center font-bold uppercase text-slate-500">MC Number</th>
                                <th class="px-6 py-4 text-center font-bold uppercase text-slate-500">Staff ID</th>
                                <th class="px-6 py-4 text-right font-bold uppercase text-slate-500">Recommendation</th>
                            </tr>
                        </thead>
                        <tbody id="appointmentTableBody" class="divide-y divide-[#dbe3f0]">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetchAppointments();

            // සෙවුම් පහසුකම (Search Functionality)
            document.getElementById('searchInput').addEventListener('input', function(e) {
                const term = e.target.value.toLowerCase();
                const rows = document.querySelectorAll('#appointmentTableBody tr');
                rows.forEach(row => {
                    row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none';
                });
            });

            async function fetchAppointments() {
                try {
                    // නිවැරදි කළ URL එක (appointments - t අකුර ඇතුළුව)
                    const response = await fetch('api/assistant_get_appointments.php');
                    
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const data = await response.json();
                    const tableBody = document.getElementById('appointmentTableBody');
                    tableBody.innerHTML = ''; 

                    if (data.error) {
                        console.error('Backend Error:', data.error);
                        tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-center text-red-500">${data.error}</td></tr>`;
                        return;
                    }

                    if (data && data.length > 0) {
                        data.forEach(row => {
                            const recoValue = (row.COPD_Test_recommend || '').toLowerCase();
                            const recoColor = recoValue === 'yes' ? 'text-green-600' : 'text-red-600';
                            
                            const tr = document.createElement('tr');
                            tr.className = 'hover:bg-[var(--table-hover)]';
                            tr.innerHTML = `
                                <td class="px-6 py-4 text-left font-mono text-primary">${row.Patient_ID || '-'}</td>
                                <td class="px-6 py-4 text-center font-semibold">${row.Appoinment_no || '-'}</td>
                                <td class="px-6 py-4 text-center text-slate-600">${row.Appoinment_date || '-'}</td>
                                <td class="px-6 py-4 text-center font-semibold">${row.MC_number || '-'}</td>
                                <td class="px-6 py-4 text-center text-slate-600">${row.staff_id || '-'}</td>
                                <td class="px-6 py-4 text-right font-semibold ${recoColor}">${row.COPD_Test_recommend || 'N/A'}</td>
                            `;
                            tableBody.appendChild(tr);
                        });
                    } else {
                        tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center">No appointments found.</td></tr>';
                    }
                } catch (error) {
                    console.error('Fetch Error:', error);
                    document.getElementById('appointmentTableBody').innerHTML = 
                        '<tr><td colspan="6" class="px-6 py-4 text-center text-red-500">Failed to load data. Check console for details.</td></tr>';
                }
            }
        });
    </script>
